version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead_intelligence_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./generated_pdfs:/app/generated_pdfs
      - ./workflow_logs:/app/workflow_logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
